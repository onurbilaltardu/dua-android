name: Build AAB and APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Unzip
        run: |
          unzip -o proje.zip -d extracted
          ls -R extracted

      - name: Find gradlew safely
        run: |
          FILE=$(find extracted -type f -name gradlew | head -n 1)
          echo "FOUND FILE: $FILE"

          DIR=$(dirname "$FILE")
          echo "DIR: $DIR"

          echo "DIR=$DIR" >> $GITHUB_ENV

      - name: Build
        run: |
          cd "$DIR"
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/*.apk'

      - uses: actions/upload-artifact@v4
        with:
          name: aab
          path: '**/*.aab'
