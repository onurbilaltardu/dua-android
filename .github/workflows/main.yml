name: Build AAB and APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Unzip
        run: unzip -o proje.zip -d extracted

      - name: Build APK & AAB
        run: |
          DIR=$(find extracted -type f -name "gradlew" | head -n 1 | xargs dirname)
          echo "Gradle path: $DIR"

          cd "$DIR"
          chmod +x gradlew

          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/*.apk'

      - uses: actions/upload-artifact@v4
        with:
          name: aab
          path: '**/*.aab'
