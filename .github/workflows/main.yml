name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip proje.zip -d project

      - name: Copy signing keystore
        run: |
          cp signing.keystore project/signing.keystore

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Show files
        run: |
          find project -maxdepth 4 -type f

      - name: Grant permission
        run: |
          GRADLEW_PATH="$(find project -type f -name gradlew | head -n 1)"
          GRADLE_DIR="$(dirname "$GRADLEW_PATH")"
          echo "$GRADLEW_PATH"
          echo "$GRADLE_DIR"
          cd "$GRADLE_DIR"
          chmod +x gradlew

      - name: Build release AAB
        run: |
          GRADLEW_PATH="$(find project -type f -name gradlew | head -n 1)"
          GRADLE_DIR="$(dirname "$GRADLEW_PATH")"
          echo "$GRADLEW_PATH"
          echo "$GRADLE_DIR"
          cd "$GRADLE_DIR"
          ./gradlew bundleNormalRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: project/**/*.aab
