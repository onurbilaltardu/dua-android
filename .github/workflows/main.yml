name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir -p project
          unzip -o proje.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Find project folder
        run: |
          PROJECT_DIR="$(find project -type f -name gradlew | head -n 1 | xargs -I {} dirname "{}")"
          {
            echo 'PROJECT_DIR<<EOF'
            echo "$PROJECT_DIR"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          echo "$PROJECT_DIR"

      - name: Copy keystore
        run: |
          cp signing.keystore "$(dirname "$PROJECT_DIR")/signing.keystore"

      - name: Grant permission
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

      - name: Build AAB
        run: |
          cd "$PROJECT_DIR"
          ./gradlew bundleNormalRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: project/**/*.aab
