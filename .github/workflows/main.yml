name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip proje.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create keystore
        run: |
          keytool -genkeypair -v \
            -keystore project/release.keystore \
            -storepass 123456 \
            -keypass 123456 \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Onur,O=Android,C=TR"

      - name: Find project folder
        run: |
          PROJECT_DIR=$(find project -mindepth 1 -maxdepth 1 -type d | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "$PROJECT_DIR"

      - name: Grant permission
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

      - name: Build release AAB
        run: |
          cd "$PROJECT_DIR"
          ./gradlew bundleRelease

      - name: Find AAB
        run: |
          find project -name "*.aab"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: project/**/*.aab
