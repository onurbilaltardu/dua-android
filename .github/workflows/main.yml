name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o proje.zip -d project

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Move to project folder
        run: |
          cd "project/Android_dua_90_admob_integrated-2/android dua"
          ls

      - name: Give gradlew permission
        run: |
          cd "project/Android_dua_90_admob_integrated-2/android dua"
          chmod +x gradlew

      - name: Build AAB
        run: |
          cd "project/Android_dua_90_admob_integrated-2/android dua"
          ./gradlew bundleNormalRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: AAB
          path: project/Android_dua_90_admob_integrated-2/android dua/app/build/outputs/bundle/normalRelease/*.aab
