name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Find project
        run: |
          PROJECT=$(find . -name gradlew | head -n 1 | sed 's/\/gradlew//')
          echo "Project path: $PROJECT"
          chmod +x "$PROJECT/gradlew"
          cd "$PROJECT"
          ./gradlew clean bundleNormalRelease

      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: "**/app/build/outputs/bundle/normalRelease/*.aab"
