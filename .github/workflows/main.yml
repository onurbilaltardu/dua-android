name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: |
          APP_DIR="$(find . -type f -name gradlew | head -n 1 | xargs dirname)"
          chmod +x "$APP_DIR/gradlew"
          cd "$APP_DIR"
          ./gradlew clean bundleNormalRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: app-normal-release
          path: "**/app/build/outputs/bundle/normalRelease/*.aab"
