name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip proje.zip -d project

      - name: Copy signing keystore
        run: |
          cp signing.keystore project/signing.keystore

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Find gradle project folder
        run: |
          GRADLE_DIR=$(find project -name gradlew -type f | head -n 1 | xargs dirname)
          echo "GRADLE_DIR=$GRADLE_DIR" >> $GITHUB_ENV
          echo "$GRADLE_DIR"

      - name: Grant permission
        run: |
          cd "$GRADLE_DIR"
          chmod +x gradlew

      - name: Build release AAB
        run: |
          cd "$GRADLE_DIR"
          ./gradlew bundleNormalRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: project/**/build/outputs/bundle/normalRelease/*.aab
``
