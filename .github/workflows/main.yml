name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip proje.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Find project folder
        run: |
          cd project
          ls

      - name: Permission
        run: |
          cd project/*
          chmod +x gradlew

      - name: Build APK
        run: |
          cd project/*
          ./gradlew assembleDebug

      - name: Find APK
        run: |
          find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            project/**/*.apk
