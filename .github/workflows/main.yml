name: Build AAB and APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Unzip
        run: |
          unzip -o proje.zip -d extracted

      - name: Find gradlew
        run: |
          FILE=$(find extracted -type f -name gradlew | head -n 1)
          DIR=$(dirname "$FILE")
          echo "DIR=$DIR" >> $GITHUB_ENV

      - name: Fix missing drawables
        run: |
          DRAWABLE="$DIR/app/src/main/res/drawable"
          mkdir -p "$DRAWABLE"

          # splash fix
          cat > "$DRAWABLE/splash.xml" <<'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FFFFFF"/>
          </shape>
          EOF

          # ic_actionbar fix
          cat > "$DRAWABLE/ic_actionbar.xml" <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#000000"
                  android:pathData="M3,6h18M3,12h18M3,18h18"/>
          </vector>
          EOF

      - name: Build
        run: |
          cd "$DIR"
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/*.apk'

      - uses: actions/upload-artifact@v4
        with:
          name: aab
          path: '**/*.aab'
