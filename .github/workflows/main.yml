name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Unzip
        run: unzip -o proje.zip -d project

      - name: Build
        run: |
          DIR=$(find project -name gradlew | head -n 1 | xargs dirname)
          chmod +x "$DIR/gradlew"
          cd "$DIR"
          ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: aab
          path: project/**/app/build/outputs/bundle/release/*.aab
