Name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir -p project
          unzip proje.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Keystore
        run: |
          # Anahtarı en üst dizinde oluşturuyoruz
          keytool -genkey -v \
          -keystore release.keystore \
          -alias release \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass 123456 \
          -keypass 123456 \
          -dname "CN=Onur,O=Android,C=TR"

      - name: Build Release AAB
        run: |
          # Proje klasörüne gir ve gradlew'i bul
          cd project && find . -name "gradlew" -exec chmod +x {} +
          
          # Gradle'a şifreleri komutla veriyoruz (En kritik yer burası)
          cd project && ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=123456 \
            -Pandroid.injected.signing.key.alias=release \
            -Pandroid.injected.signing.key.password=123456

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: project/**/*.aab
