name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Unzip
        run: unzip -o proje.zip -d project

      - name: Grant permission
        run: chmod +x "project/Android_dua_90_admob_integrated-2/android dua/gradlew"

      - name: Build
        run: |
          cd "project/Android_dua_90_admob_integrated-2/android dua"
          ./gradlew clean bundleNormalRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: app-normal-release
          path: project/Android_dua_90_admob_integrated-2/android dua/app/build/outputs/bundle/normalRelease/*.aab
