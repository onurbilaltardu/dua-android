name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Check zip
        run: unzip -t proje.zip

      - name: Unzip project
        run: unzip -o proje.zip -d project

      - name: Build
        shell: bash
        run: |
          DIR="$(dirname "$(find project -type f -name gradlew | head -n 1)")"
          chmod +x "$DIR/gradlew"
          cd "$DIR"
          ./gradlew clean bundleNormalRelease --stacktrace

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-normal-release
          path: project/**/app/build/outputs/bundle/normalRelease/*.aab
          if-no-files-found: error
