name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o proje.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Create keystore
        run: |
          mkdir -p project/Android_dua_90_admob_integrated-2
          touch project/Android_dua_90_admob_integrated-2/release.keystore
          touch project/Android_dua_90_admob_integrated-2/upload.keystore

      - name: Build AAB
        run: |
          cd "project/Android_dua_90_admob_integrated-2/android dua"
          chmod +x gradlew
          ./gradlew bundleNormalRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: project/Android_dua_90_admob_integrated-2/android dua/app/build/outputs/bundle/normalRelease/*.aab
