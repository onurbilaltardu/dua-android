name: Build AAB and APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Unzip
        run: unzip -o proje.zip -d extracted

      - name: Fix folder names
        run: |
          cd extracted
          find . -depth -name "* *" -exec bash -c 'mv "$0" "${0// /_}"' {} \;
          find . -depth -name "*(*" -exec bash -c 'mv "$0" "${0//(/_}"' {} \;
          find . -depth -name "*)" -exec bash -c 'mv "$0" "${0//)/_}"' {} \;

      - name: Fix splash crash
        run: |
          find extracted -type f -name "*.xml" -exec sed -i 's/@drawable\/splash/@android:color\/white/g' {} +

      - name: Find and Build
        run: |
          FILE=$(find extracted -type f -name "gradlew" | head -n 1)
          DIR=$(dirname "$FILE")

          echo "DIR: $DIR"

          cd "$DIR"
          chmod +x gradlew

          ./gradlew clean
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/*.apk'

      - uses: actions/upload-artifact@v4
        with:
          name: aab
          path: '**/*.aab'
