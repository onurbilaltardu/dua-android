name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build AAB
        run: |
          cd "android dua"
          chmod +x gradlew
          ./gradlew clean bundleNormalRelease

      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: android dua/app/build/outputs/bundle/normalRelease/*.aab
