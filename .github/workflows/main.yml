name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip proje.zip -d project

      - name: Copy signing keystore
        run: |
          cp signing.keystore project/signing.keystore

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Find project folder
        run: |
          PROJECT_DIR=$(find project -mindepth 1 -maxdepth 1 -type d | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "$PROJECT_DIR"

      - name: Grant permission
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

      - name: Build release AAB
        run: |
          cd "$PROJECT_DIR"
          ./gradlew bundleNormalRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: project/**/build/outputs/bundle/normalRelease/*.aab
