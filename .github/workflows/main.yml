name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip "Android dua 90.zip" -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Permission
        run: |
          cd project/*
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd project/*
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: project/*/app/build/outputs/apk/debug/
