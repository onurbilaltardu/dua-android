name: Build AAB and APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🔍 Android klasörünü bul
      - name: Find Android folder
        id: finddir
        run: |
          DIR=$(find . -type d -name "android" | head -n 1)
          echo "DIR=$DIR" >> $GITHUB_OUTPUT
          echo "Found android at: $DIR"

      # ❌ Eğer bulamazsa direkt hata ver
      - name: Stop if not found
        run: |
          if [ -z "${{ steps.finddir.outputs.DIR }}" ]; then
            echo "ANDROID FOLDER NOT FOUND"
            exit 1
          fi

      # 🔧 Splash fix
      - name: Fix splash
        run: |
          sed -i 's/@drawable\/splash/@android:color\/white/g' ${{ steps.finddir.outputs.DIR }}/app/src/main/res/values/*.xml || true

      # 🔥 BUILD
      - name: Build
        run: |
          cd ${{ steps.finddir.outputs.DIR }}
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/app-release.apk'

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab
          path: '**/*.aab'
