name: Build AAB and APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Unzip project
        run: unzip -o proje.zip -d extracted

      # 🔥 SPLASH HATASINI KÖKTEN SİLİYORUZ
      - name: Fix splash crash
        run: |
          find extracted -type f -name "*.xml" -exec sed -i 's/@drawable\/splash/@android:color\/white/g' {} +

      - name: Find project and build
        run: |
          FILE=$(find extracted -type f -name "gradlew" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "GRADLEW BULUNAMADI"
            exit 1
          fi

          DIR=$(dirname "$FILE")

          echo "FOUND: $FILE"
          echo "DIR: $DIR"

          cd "$DIR"

          chmod +x gradlew

          ./gradlew clean
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/*.apk'

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab
          path: '**/*.aab'
