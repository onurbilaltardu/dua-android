name: Build AAB and APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Find gradlew
        run: |
          echo "Searching for gradlew..."
          find . -name "gradlew"

      - name: Build
        run: |
          DIR=$(find . -name "gradlew" | head -n 1 | xargs dirname)
          echo "Gradle dir: $DIR"
          cd $DIR
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/app-release.apk'

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab
          path: '**/*.aab'
