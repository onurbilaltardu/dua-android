name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip proje.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Permission
        run: |
          cd project/*
          chmod +x gradlew

      - name: Build Release AAB
        run: |
          cd project/*
          ./gradlew bundleRelease

      - name: Find AAB
        run: |
          find . -name "*.aab"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: |
            project/**/*.aab
